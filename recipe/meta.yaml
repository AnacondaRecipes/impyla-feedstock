{% set version = "0.22.0" %}

package:
  name: impyla
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/i/impyla/impyla-{{ version }}.tar.gz
  sha256: 19def919ef8295a622fdf2f6d04fe1e5954c4d932a397fbde26a89c6c29ef33d

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python
    - setuptools
    - pip
    - wheel
  run:
    - python
    - six
    - bitarray
    - thriftpy2 >=0.4.0,<0.5.0
    - thrift ==0.16.0
    - thrift_sasl ==0.4.3
  run_constrained:
    - kerberos >=1.3.0

test:
  requires:
    - pip
  commands:
    - pip check
  imports:
    - impala
    - impala.tests
    - impala.thrift

about:
  home: https://github.com/cloudera/impyla
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE.txt
  summary: Python client for the Impala distributed query engine
  description: |
    Python DB API 2.0 client for Impala and Hive (HiveServer2 protocol)
  doc_url: https://pypi.org/project/impyla
  dev_url: https://github.com/cloudera/impyla

extra:
  recipe-maintainers:
    - mariusvniekerk
    - wesm
    - kszucs
